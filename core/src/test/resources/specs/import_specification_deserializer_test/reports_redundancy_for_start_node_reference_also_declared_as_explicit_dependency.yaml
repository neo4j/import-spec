---
version: '1'
sources:
  - name: a-source
    type: jdbc
    data_source: a-data-source
    sql: SELECT id, name FROM my.table
targets:
  nodes:
    - name: a-node-target
      source: a-source
      identifying_label: Label
      properties:
        - source_field: id
          target_property: id
      schema:
        key_constraints:
          - name: a-key-constraint
            properties:
              - id
    - name: another-node-target
      source: a-source
      identifying_label: Label2
      properties:
        - source_field: id
          target_property: id
      schema:
        key_constraints:
          - name: another-key-constraint
            properties:
              - id
  relationships:
    - name: a-relationship-target
      source: a-source
      type: TYPE
      start_node_reference: a-node-target
      end_node_reference: another-node-target
      dependencies:
        - a-node-target

