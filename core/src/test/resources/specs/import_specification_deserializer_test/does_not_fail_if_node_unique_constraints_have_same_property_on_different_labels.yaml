---
version: '1'
sources:
- name: a-source
  type: jdbc
  data_source: a-data-source
  sql: SELECT id, name FROM my.table
targets:
  nodes:
  - active: true
    name: a-target
    source: a-source
    write_mode: merge
    labels:
    - Label1
    - Label2
    properties:
    - source_field: id
      target_property: property1
    schema:
      unique_constraints:
      - name: a unique constraint
        label: Label1
        properties:
        - property1
      - name: another unique constraint
        label: Label2
        properties:
        - property1
