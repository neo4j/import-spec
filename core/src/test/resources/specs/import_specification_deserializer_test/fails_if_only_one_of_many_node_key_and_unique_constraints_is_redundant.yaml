---
version: '1'
sources:
- name: a-source
  type: jdbc
  data_source: a-data-source
  sql: SELECT id, name, extra FROM my.table
targets:
  nodes:
  - active: true
    name: a-target
    source: a-source
    write_mode: merge
    labels:
    - Label
    properties:
    - source_field: id
      target_property: property1
    - source_field: name
      target_property: property2
    - source_field: extra
      target_property: property3
    schema:
      key_constraints:
      - name: a key constraint
        label: Label
        properties:
        - property2
        - property3
      - name: another key constraint
        label: Label
        properties:
        - property1
        - property2
      unique_constraints:
      - name: a unique constraint
        label: Label
        properties:
        - property1
      - name: another unique constraint
        label: Label
        properties:
        - property2
        - property3