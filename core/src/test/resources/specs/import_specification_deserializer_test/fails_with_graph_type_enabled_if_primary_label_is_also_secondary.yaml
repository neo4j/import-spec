version: '1'
config:
  enable_graph_type: true
sources:
  - name: a-source
    type: jdbc
    data_source: a-data-source
    sql: SELECT id, name FROM my.table
targets:
  nodes:
    - name: a-target
      source: a-source
      labels:
        - PrimaryAndSecondary
      properties:
        - source_field: id
          target_property: property1
        - source_field: name
          target_property: property2
      schema:
        key_constraints:
          - name: a key constraint
            label: PrimaryAndSecondary
            properties:
              - property1
    - name: a-target-2
      source: a-source
      labels:
        - AnotherNode
        - PrimaryAndSecondary
      properties:
        - source_field: id
          target_property: property1
        - source_field: name
          target_property: property2
      schema:
        key_constraints:
          - name: a key constraint 2
            label: AnotherNode
            properties:
              - property1
