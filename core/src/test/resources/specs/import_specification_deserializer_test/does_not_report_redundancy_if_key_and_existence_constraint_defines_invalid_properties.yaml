---
version: '1'
sources:
  - name: a-source
    type: jdbc
    data_source: a-data-source
    sql: SELECT id, name FROM my.table
targets:
  nodes:
    - active: true
      name: a-target
      source: a-source
      write_mode: merge
      identifying_label: Label
      properties:
        - source_field: id
          target_property: property1
        - source_field: name
          target_property: property2
      schema:
        key_constraints:
          - name: a key constraint
            properties:
              - property1
        existence_constraints:
          - name: an existence constraint
            property: not-a-prop

