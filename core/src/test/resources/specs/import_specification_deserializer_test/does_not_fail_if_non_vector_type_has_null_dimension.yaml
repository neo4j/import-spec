version: "1"
sources:
  - type: bigquery
    name: my-bigquery-source
    query: SELECT id, name FROM my.table
targets:
  nodes:
    - name: my-node
      source: my-bigquery-source
      labels: [ALabel]
      properties:
        - source_field: id
          target_property: id
          target_property_type:
            name: FLOAT
